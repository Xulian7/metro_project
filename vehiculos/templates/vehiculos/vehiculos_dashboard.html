{% extends "accounts/home.html" %}
{% load static %}
{% block content %}
<div class="card p-4 shadow-sm">
    <h3 class="fw-bold mb-4">Vehículos</h3>

    <!-- ========================= -->
    <!-- Formulario Crear/Actualizar Vehículo -->
    <!-- ========================= -->
    <form method="post" action="{% url 'vehiculo_guardar' %}" class="row g-3 mb-4" hx-post="{% url 'vehiculo_guardar' %}" hx-target="#tabla-vehiculos" hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="vehiculo_id" id="modal-vehiculo-id">
        <div class="col-md-4"><label class="form-label">Placa</label><input type="text" name="placa" id="modal-placa" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Marca</label><input type="text" name="marca" id="modal-marca" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Modelo</label><input type="text" name="modelo" id="modal-modelo" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Serie</label><input type="text" name="serie" id="modal-serie" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Propietario</label><input type="text" name="propietario" id="modal-propietario" class="form-control"></div>
        <div class="col-md-4"><label class="form-label"># Motor</label><input type="text" name="numero_motor" id="modal-motor" class="form-control"></div>
        <div class="col-md-4"><label class="form-label"># Chasis</label><input type="text" name="numero_chasis" id="modal-chasis" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Actualización SOAT</label><input type="date" name="actualizacion_soat" id="modal-soat" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Estado</label>
            <select name="estado" id="modal-estado" class="form-select">
                <option value="Activo">Activo</option>
                <option value="Vitrina">Vitrina</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>
        <div class="col-12"><button type="submit" class="btn btn-primary">Guardar Vehículo</button></div>
    </form>

    <!-- ============================ -->
    <!-- Filtros + Tabla -->
    <!-- ============================ -->
    <div class="row mb-3 g-3">
        <div class="col-md-4">
            <input type="text" id="filtro-vehiculos" class="form-control" placeholder="Buscar placa/marca/modelo..." hx-get="{% url 'vehiculos_tabla' %}" hx-target="#tabla-vehiculos" hx-trigger="keyup changed delay:300ms">
        </div>
        <div class="col-md-4">
            <input type="text" id="filtro-propietario" class="form-control" placeholder="Propietario..." hx-get="{% url 'vehiculos_tabla' %}" hx-target="#tabla-vehiculos" hx-trigger="keyup changed delay:300ms">
        </div>
        <div class="col-md-4">
            <select id="filtro-estado" class="form-select" hx-get="{% url 'vehiculos_tabla' %}" hx-target="#tabla-vehiculos" hx-trigger="change">
                <option value="">Todos los estados</option>
                <option value="Activo">Activo</option>
                <option value="Vitrina">Vitrina</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>
    </div>

    <!-- Tabla -->
    <div id="tabla-vehiculos" hx-get="{% url 'vehiculos_tabla' %}" hx-trigger="load">
        <!-- La tabla se renderiza con HTMX -->
    </div>
</div>

{% endblock %}
