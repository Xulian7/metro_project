<table class="table table-striped table-bordered">
<thead class="table-dark">
<tr>
<th>Placa</th><th>Marca</th><th>Modelo</th><th>Serie</th><th>Propietario</th><th># Motor</th><th># Chasis</th><th>SOAT</th><th>Estado</th><th>Acciones</th>
</tr>
</thead>
<tbody>
{% for v in page_obj %}
<tr>
<td>{{ v.placa }}</td>
<td>{{ v.marca }}</td>
<td>{{ v.modelo }}</td>
<td>{{ v.serie }}</td>
<td>{{ v.propietario }}</td>
<td>{{ v.numero_motor }}</td>
<td>{{ v.numero_chasis }}</td>
<td>{{ v.actualizacion_soat }}</td>
<td>{{ v.estado }}</td>
<td>
<button class="btn btn-sm btn-warning edit-vehiculo-btn"
    hx-get="#"
    onclick="rellenarModal({{ v.id }}, '{{ v.placa }}','{{ v.marca }}','{{ v.modelo }}','{{ v.serie }}','{{ v.propietario }}','{{ v.numero_motor }}','{{ v.numero_chasis }}','{{ v.actualizacion_soat }}','{{ v.estado }}')"
    data-bs-toggle="modal"
    data-bs-target="#modal-vehiculo-id">
Editar</button>
</td>
</tr>
{% endfor %}
</tbody>
</table>
